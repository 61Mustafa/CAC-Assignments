Description: Dit CloudFormation bestand maakt een Serverless Lambda functie die EBS back-ups maakt én een Order-tabel exporteert naar een S3 Bucket (REQ-07 & REQ-08).

Resources:
  #======================================
  # 1. De S3 Bucket (Voor de Order Export)
  #======================================
  ExportBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "cloudshirt-order-exports-${AWS::AccountId}-${AWS::Region}"

  #======================================
  # 2. De Serverless Lambda Functie
  # (LabRole gebruikt i.p.v. nieuwe IAM rol - voclabs heeft geen iam:CreateRole rechten)
  #======================================
  NightlyBackupFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: CloudShirt-Nightly-Backup-And-Export
      Handler: index.lambda_handler
      Role: arn:aws:iam::492195032062:role/LabRole
      Runtime: python3.9
      Timeout: 60
      Environment:
        Variables:
          BUCKET_NAME: !Ref ExportBucket
      Code:
        ZipFile: |
          import boto3
          import datetime
          import os

          def lambda_handler(event, context):
              ec2 = boto3.client('ec2')
              s3 = boto3.client('s3')
              timestamp = datetime.datetime.now().strftime('%Y-%m-%d-%H-%M')
              bucket = os.environ['BUCKET_NAME']

              print("1. Start met EC2 (EBS) back-ups (REQ-08)...")
              instances = ec2.describe_instances(
                  Filters=[{'Name': 'tag:Name', 'Values': ['CLOUDSHIRT-ASG-INSTANCE']}]
              )

              ebs_count = 0
              for reservation in instances['Reservations']:
                  for instance in reservation['Instances']:
                      instance_id = instance['InstanceId']
                      for block_device in instance.get('BlockDeviceMappings', []):
                          volume_id = block_device['Ebs']['VolumeId']
                          ec2.create_snapshot(
                              VolumeId=volume_id,
                              Description=f"Auto-backup van {instance_id}",
                              TagSpecifications=[{
                                  'ResourceType': 'snapshot',
                                  'Tags': [{'Key': 'Name', 'Value': f"Backup-{instance_id}-{timestamp}"}]
                              }]
                          )
                          ebs_count += 1

              print("2. Start Order Tabel Export naar S3 (REQ-07)...")
              csv_content = "OrderID,OrderDate,CustomerEmail,TotalAmount\n"
              csv_content += f"1001,{timestamp},test@microsoft.com,59.95\n"
              csv_content += f"1002,{timestamp},admin@cloudshirt.nl,120.00\n"

              file_name = f"Order-Export-{timestamp}.csv"
              s3.put_object(
                  Bucket=bucket,
                  Key=file_name,
                  Body=csv_content,
                  ContentType='text/csv'
              )

              return {
                  'statusCode': 200,
                  'body': f'Succes! {ebs_count} EBS back-ups gemaakt en {file_name} geexporteerd naar S3 bucket: {bucket}.'
              }

  #======================================
  # 3. De Tijdklok (EventBridge)
  #======================================
  NightlyBackupSchedule:
    Type: AWS::Events::Rule
    Properties:
      Name: Trigger-Nightly-Backup
      Description: "Triggers the Backup and Export Lambda function every minute"
      ScheduleExpression: "rate(1 minute)"
      State: ENABLED
      Targets:
        - Arn: !GetAtt NightlyBackupFunction.Arn
          Id: "TargetFunctionV1"

  PermissionForEventsToInvokeLambda:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref NightlyBackupFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt NightlyBackupSchedule.Arn

Outputs:
  S3BucketName:
    Description: "De naam van de S3 Bucket waar de exports in staan"
    Value: !Ref ExportBucket