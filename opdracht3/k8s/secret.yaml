# Kubernetes Secret voor CloudShirt database credentials

apiVersion: v1
kind: Secret
metadata:
  name: cloudshirt-secrets
  namespace: default

# Opaque type voor algemene key value secret data
type: Opaque

# stringData wordt automatisch base64 encoded door Kubernetes
stringData:
  # Connection string voor catalog database (producten, bestellingen, winkelwagen)
  CatalogConnection: "Server={{ rds_endpoint }};Database=CloudShirtDb;User Id={{ db_user }};Password={{ db_password }};TrustServerCertificate=True;"
  # Connection string voor identity database (gebruikers, authenticatie, autorisatie)
  IdentityConnection: "Server={{ rds_endpoint }};Database=CloudShirtDb;User Id={{ db_user }};Password={{ db_password }};TrustServerCertificate=True;"