apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudshirt-web
  labels:
    app: cloudshirt-web
spec:
  replicas: 5
  selector:
    matchLabels:
      app: cloudshirt-web
  template:
    metadata:
      labels:
        app: cloudshirt-web
    spec:
      containers:
        - name: cloudshirt-web
          image: {{ ecr_url }}:latest
          ports:
              - containerPort: 80
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: "Production"
            # De connection strings komen uit de Secret (cloudshirt-secrets).
            - name: ConnectionStrings__CatalogConnection
              valueFrom:
                secretKeyRef:
                  name: cloudshirt-secrets
                  key: CatalogConnection
            - name: ConnectionStrings__IdentityConnection
              valueFrom:
                secretKeyRef:
                  name: cloudshirt-secrets
                  key: IdentityConnection
          # Zorgt dat de load balancer alleen verkeer stuurt naar pods die echt klaar zijn.
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 20