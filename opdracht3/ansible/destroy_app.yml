---
# Cleanup playbook voor het verwijderen van CloudShirt applicatie resources
# Wordt gebruikt door destroy.sh om clean Terraform teardown mogelijk te maken

- name: Verwijder de CloudShirt applicatie van het cluster
  hosts: localhost
  gather_facts: false
  vars_files:
    - group_vars/all.yml

  tasks:
    # Stap 1: Verbinding maken met EKS cluster voor cleanup operaties
    - name: Koppel aan het EKS cluster
      ansible.builtin.command: >
        aws eks update-kubeconfig
        --name {{ cluster_name }}
        --region {{ aws_region }}
      changed_when: false

    # Stap 2: Service verwijderen (KRITIEK: LoadBalancer eerst verwijderen)
    # AWS LoadBalancer moet weg voordat Terraform de VPC kan opruimen
    - name: Verwijder de Service (en daarmee de AWS LoadBalancer)
      kubernetes.core.k8s:
        state: absent
        kind: Service
        name: cloudshirt-web
        namespace: default

    # Stap 3: Application pods en containers opruimen
    - name: Verwijder de Deployment
      kubernetes.core.k8s:
        state: absent
        kind: Deployment
        name: cloudshirt-web
        namespace: default

    # Stap 4: Database credentials opruimen
    - name: Verwijder de Secret
      kubernetes.core.k8s:
        state: absent
        kind: Secret
        name: cloudshirt-secrets
        namespace: default