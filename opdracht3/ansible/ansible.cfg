# Ansible configuratiebestand voor CloudShirt deployment
# Dit bestand stelt de tijdelijke mappen in voor Ansible operaties

[defaults]
# Tijdelijke map op de doelmachine waar Ansible scripts/modules worden uitgevoerd
# Geconfigureerd voor AWS CloudShell/development environment
remote_tmp     = /aws/mde/ide-runtimes/ansible-tmp

# Lokale tijdelijke map waar Ansible bestanden tijdelijk opslaat
# Het pad /aws/mde/ is een standaard AWS managed development locatie
local_tmp      = /aws/mde/ide-runtimes/ansible-tmp
