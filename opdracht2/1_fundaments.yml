AWSTemplateFormatVersion: '2010-09-09'
Description: Base VPC (10.0.0.0/16) met een public en private subnet in twee availability zones.

Parameters:
  #============================
  # CIDR Blocks
  #============================
  VPCCIDR:
    Description: IP reeks (CIDR) voor mijn vpc.
    Type: String
    Default: 10.0.0.0/16
  
  #============================
  # Availability Zone 1 (AZ1)
  #============================

  AZ1PUBLICSUBNETCIDR:
    Description: IP-reeks (CIDR) voor het publieke subnet in AZ1
    Type: String
    Default: 10.0.1.0/24

  AZ1PRIVATESUBNETCIDR:
    Description: IP-reeks (CIDR) voor het private subnet in AZ1
    Type: String
    Default: 10.0.51.0/24

  #============================
  # Availability Zone 2 (AZ2)
  #============================

  AZ2PUBLICSUBNETCIDR:
    Description: IP-reeks (CIDR) voor het publieke subnet in AZ2
    Type: String
    Default: 10.0.2.0/24

  AZ2PRIVATESUBNETCIDR:
    Description: IP-reeks (CIDR) voor het private subnet in AZ2
    Type: String
    Default: 10.0.52.0/24

Resources:
  #============================
  # VPC
  #============================

  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VPCCIDR
      EnableDnsHostnames: true # Zorgt ervoor dat je servers gebruiksvriendelijke DNS namen krijgen in plaats van alleen onthoudbare IP-adressen.
      Tags:
        - Key: Name
          Value: VPC

  #============================
  # Subnets in AZ1
  #============================

  AZ1PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      CidrBlock: !Ref AZ1PUBLICSUBNETCIDR
      MapPublicIpOnLaunch: true # Deel automatisch publieke IP adressen uit aan nieuwe servers.
      VpcId: !Ref VPC
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: PUBLIC-SUBNET-AZ1

  AZ1PrivateSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      CidrBlock: !Ref AZ1PRIVATESUBNETCIDR
      MapPublicIpOnLaunch: false # Géén publieke IP adressen uitdelen voor private instances.
      VpcId: !Ref VPC
      AvailabilityZone: !Select [0, !GetAZs ''] # Wederom de eerste zone.
      Tags:
        - Key: Name
          Value: PRIVATE-SUBNET-AZ1

  #============================
  # Subnets in Zone 2 (AZ2)
  #============================

  AZ2PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      CidrBlock: !Ref AZ2PUBLICSUBNETCIDR
      MapPublicIpOnLaunch: true
      VpcId: !Ref VPC
      AvailabilityZone: !Select [1, !GetAZs '']
      Tags:
        - Key: Name
          Value: PUBLIC-SUBNET-AZ2

  AZ2PrivateSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      CidrBlock: !Ref AZ2PRIVATESUBNETCIDR
      MapPublicIpOnLaunch: false
      VpcId: !Ref VPC
      AvailabilityZone: !Select [1, !GetAZs '']
      Tags:
        - Key: Name
          Value: PRIVATE-SUBNET-AZ2


  #======================================
  # Internet Gateway & Route Tables
  #======================================

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: INTERNETGATEWAY

  InternetGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: PUBLIC-ROUTE-TABLE

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: PRIVATE-ROUTE-TABLE

  MyDefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: InternetGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway


  #============================
  # Route Table associations
  #============================

  AZ1PublicSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref AZ1PublicSubnet
      RouteTableId: !Ref PublicRouteTable

  AZ2PublicSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref AZ2PublicSubnet
      RouteTableId: !Ref PublicRouteTable

  #============================
  # NAT Gateway
  #============================

  NatGatewayEIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc

  NatGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatGatewayEIP.AllocationId
      SubnetId: !Ref AZ1PublicSubnet # De NAT Gateway moet zélf wél in een publiek subnet staan om bij het internet te kunnen.
      Tags:
        - Key: Name
          Value: NAT-GATEWAY

  PrivateRouteToInternet:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway

  AZ1PrivateSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref AZ1PrivateSubnet
      RouteTableId: !Ref PrivateRouteTable

  AZ2PrivateSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref AZ2PrivateSubnet
      RouteTableId: !Ref PrivateRouteTable


  #============================
  # Firewalls (Security Groups)
  #============================

  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Sta HTTP verkeer toe vanaf het internet naar de Load Balancer
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: ALB-SECURITY-GROUP

  WebServerSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Sta HTTP uitsluitend toe via de ALB, en sta SSH toegang toe voor beheer.
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: -1
          FromPort: 80
          ToPort: 80
          SourceSecurityGroupId: !Ref ALBSecurityGroup # Alleen verkeer dat al door de Load Balancer firewall is gekomen mag door.
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: WEBSERVER-SECURITY-GROUP

#============================
# Outputs
#============================
Outputs:
  VPCRef:
    Description: Een verwijzing naar de aangemaakte VPC
    Value: !Ref VPC
    Export:
      Name: !Join [":", [!Ref "AWS::StackName", "VPC"]]

  AZ1PrivateSubnetRef:
    Description: Verwijzing naar het private subnet in AZ1
    Value: !Ref AZ1PrivateSubnet
    Export:
      Name: !Join [":", [!Ref "AWS::StackName", "AZ1PrivateSubnet"]]

  AZ2PrivateSubnetRef:
    Description: Verwijzing naar het private subnet in AZ2
    Value: !Ref AZ2PrivateSubnet
    Export:
      Name: !Join [":", [!Ref "AWS::StackName", "AZ2PrivateSubnet"]]

  WebServerSecurityGroupRef:
    Description: Verwijzing naar de veilige firewall van de webservers
    Value: !Ref WebServerSecurityGroup
    Export:
      Name: !Join [":", [!Ref "AWS::StackName", "WebServerSecurityGroup"]]

  AZ1PublicSubnetRef:
    Description: Verwijzing naar het publieke subnet in AZ1
    Value: !Ref AZ1PublicSubnet
    Export:
      Name: !Join [":", [!Ref "AWS::StackName", "AZ1PublicSubnet"]]

  AZ2PublicSubnetRef:
    Description: Verwijzing naar het publieke subnet in AZ2
    Value: !Ref AZ2PublicSubnet
    Export:
      Name: !Join [":", [!Ref "AWS::StackName", "AZ2PublicSubnet"]]

  ALBSecurityGroupRef:
    Description: Verwijzing naar de publieke firewall van de Load Balancer
    Value: !Ref ALBSecurityGroup
    Export:
      Name: !Join [":", [!Ref "AWS::StackName", "ALBSecurityGroup"]]