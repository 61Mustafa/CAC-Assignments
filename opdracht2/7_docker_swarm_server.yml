AWSTemplateFormatVersion: '2010-09-09'
Description: Docker Buildserver (Swarm Manager), AWS ECR Repository en Nightly Builds

Parameters:
  BaseStackName:
    Type: String
    Default: MyFundamentStack
  StorageStackName:
    Type: String
    Default: MyStorageStack
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Default: vockey
  LatestAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2

Resources:
  # ==========================================
  # HET MAGAZIJN (REQ-12)
  # ==========================================
  CloudShirtECR:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: cloudshirt-repo
      EmptyOnDelete: true

  # ==========================================
  # DE FABRIEK & DE BAAS (REQ-09)
  # ==========================================
  BuildServer:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t2.micro
      ImageId: !Ref LatestAmiId
      KeyName: !Ref KeyName
      IamInstanceProfile: LabInstanceProfile
      SubnetId:
        Fn::ImportValue: !Sub "${BaseStackName}:AZ1PrivateSubnet"
      SecurityGroupIds:
        - Fn::ImportValue: !Sub "${BaseStackName}:WebServerSecurityGroup"
      Tags:
        - Key: Name
          Value: Buildserver-SwarmMaster
      UserData:
        Fn::Base64: !Sub
          - |
            #!/bin/bash
            # 1. STANDAARD INSTALLATIES
            yum update -y
            amazon-linux-extras install docker -y
            yum install git jq -y
            systemctl start docker
            systemctl enable docker
            usermod -a -G docker ec2-user

            # ---------------------------------------------------------
            # DE BAAS (SWARM MANAGER - REQ-13)
            # ---------------------------------------------------------
            docker swarm init
            
            TOKEN=$(docker swarm join-token -q worker)
            IP=$(curl -s http://169.254.169.254/latest/meta-data/local-ipv4)
            
            aws ssm put-parameter --name "/swarm/worker-token" --value "$TOKEN" --type "String" --overwrite --region ${AWS::Region}
            aws ssm put-parameter --name "/swarm/manager-ip" --value "$IP" --type "String" --overwrite --region ${AWS::Region}
            aws ssm put-parameter --name "/swarm/ecr-url" --value "${CloudShirtECR.RepositoryUri}" --type "String" --overwrite --region ${AWS::Region}

            # ---------------------------------------------------------
            # DE FABRIEK (NIGHTLY BUILDS - REQ-11 & REQ-12)
            # ---------------------------------------------------------
            cat << 'EOF' > /opt/build_and_push.sh
            #!/bin/bash
            
            cd /tmp
            rm -rf CloudShirt CAC-Assignments
            
            git clone https://github.com/looking4ward/CloudShirt.git
            git clone https://github.com/61Mustafa/CAC-Assignments.git
            cp CAC-Assignments/opdracht2/Dockerfile CloudShirt/Dockerfile
            
            cd CloudShirt
            docker build --pull -t cloudshirt-web:latest -f Dockerfile .
            
            REGION=$(curl -s http://169.254.169.254/latest/dynamic/instance-identity/document | jq -r .region)
            ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
            aws ecr get-login-password --region $REGION | docker login --username AWS --password-stdin $ACCOUNT_ID.dkr.ecr.$REGION.amazonaws.com
            
            ECR_URL=$(aws ssm get-parameter --name "/swarm/ecr-url" --query "Parameter.Value" --output text --region $REGION)
            docker tag cloudshirt-web:latest $ECR_URL:latest
            docker push $ECR_URL:latest
            
            # ---------------------------------------------------------
            # DE DEPLOYMENT (Taak uitdelen aan de Workers!)
            # ---------------------------------------------------------
            cd /tmp/CAC-Assignments/opdracht2
            
            # We vervangen in de docker-compose dynamisch de Image URL naar de juiste ECR URL
            sed -i "s|image: .*|image: $ECR_URL:latest|g" docker-compose.yml
            
            # We zetten de variabelen klaar voor de database verbinding
            # RDS hostname omzetten naar IP om DNS-problemen in Swarm overlay netwerk te omzeilen
            export RDS_ENDPOINT=$(python3 -c "import socket; print(socket.gethostbyname('${DatabaseEndpoint}'))")
            export RDS_PASSWORD=Komjenietin123
            export RDS_USERNAME=adminAWS
            
            # De Baas roept over de werkvloer: Deploy de applicatie!
            docker stack deploy -c docker-compose.yml cloudshirt
            EOF
            
            chmod +x /opt/build_and_push.sh
            /opt/build_and_push.sh
            
            # ---------------------------------------------------------
            # DE WEKKER (CRONJOB - REQ-11)
            # ---------------------------------------------------------
            echo "0 3 * * * root /opt/build_and_push.sh >> /var/log/nightly_build.log 2>&1" > /etc/cron.d/nightly_docker_build
            chmod 644 /etc/cron.d/nightly_docker_build
          - DatabaseEndpoint:
              Fn::ImportValue: !Sub "${StorageStackName}:DatabaseEndpoint"

Outputs:
  ECRRepositoryUri:
    Description: De URI van je Docker Repository
    Value: !GetAtt CloudShirtECR.RepositoryUri