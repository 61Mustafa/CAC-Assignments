Description: Dit CloudFormation bestand maakt de Load Balancer en het EC2 Launch Template voor de CloudShirt .NET webapplicatie.

Parameters:
  BaseStackName:
    Description: Name of the foundational network stack
    Type: String
    Default: MyFundamentStack

  StorageStackName:
    Description: Name of the storage stack (where EFS is created)
    Type: String
    Default: MyStorageStack

  KeyName:
    Description: Name of an existing EC2 KeyPair for SSH access
    Type: AWS::EC2::KeyPair::KeyName
    Default: vockey

  LatestAmiId:
    Description: Latest Amazon Linux 2 AMI
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2

Resources:
  #======================================
  # Load Balancing
  #======================================

  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: ALB
      Scheme: internet-facing
      Type: application
      IpAddressType: ipv4
      Subnets:
        - Fn::ImportValue: !Sub "${BaseStackName}:AZ1PublicSubnet" # ALB móét in publieke subnets staan
        - Fn::ImportValue: !Sub "${BaseStackName}:AZ2PublicSubnet"
      SecurityGroups:
        - Fn::ImportValue: !Sub "${BaseStackName}:ALBSecurityGroup"
      Tags:
        - Key: Name
          Value: APPLICATION-LOADBALANCER

  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: CloudShirt-TG
      Port: 80
      Protocol: HTTP
      VpcId:
        Fn::ImportValue: !Sub "${BaseStackName}:VPC"
      TargetType: instance
      HealthCheckEnabled: true
      HealthCheckProtocol: HTTP
      HealthCheckPath: /
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 2
      Tags:
        - Key: Name
          Value: TARGET-GROUP

  ALBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

  #======================================
  # Launch Template (De Instructies voor de Werkers)
  #======================================

  WebAppLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: CloudShirt-LaunchTemplate
      LaunchTemplateData:
        ImageId: !Ref LatestAmiId
        InstanceType: t2.micro
        KeyName: !Ref KeyName
        IamInstanceProfile:
          Name: LabInstanceProfile
        SecurityGroupIds:
          - Fn::ImportValue: !Sub "${BaseStackName}:WebServerSecurityGroup"

        UserData:
          Fn::Base64: !Sub
            - |
              #!/bin/bash
              # 1. STANDAARD INSTALLATIES (Docker & EFS)
              yum update -y
              amazon-linux-extras install docker -y
              yum install -y jq amazon-efs-utils jq curl
              
              systemctl start docker
              systemctl enable docker
              usermod -a -G docker ec2-user

              # 2. EFS Aankoppelen (Voor logfiles - REQ-03)
              mkdir -p /var/log/cloudshirt
              mount -t efs -o tls ${EfsId}:/ /var/log/cloudshirt
              echo "${EfsId}:/ /var/log/cloudshirt efs defaults,_netdev 0 0" >> /etc/fstab

              # 3. WACHTEN OP DE BAAS (SSM Parameters)
              # De Auto Scaling Group is vaak sneller dan de Buildserver. 
              # We wachten tot de Buildserver zijn "Worker Token" in SSM heeft gezet.
              REGION=$(curl -s http://169.254.169.254/latest/dynamic/instance-identity/document | jq -r .region)
              
              while true; do
                TOKEN=$(aws ssm get-parameter --name "/swarm/worker-token" --query "Parameter.Value" --output text --region $REGION 2>/dev/null)
                if [ $? -eq 0 ]; then
                  break
                fi
                echo "Wachten op de Swarm Master..."
                sleep 10
              done
              
              # Haal de rest van de gegevens op
              MANAGER_IP=$(aws ssm get-parameter --name "/swarm/manager-ip" --query "Parameter.Value" --output text --region $REGION)
              ECR_URL=$(aws ssm get-parameter --name "/swarm/ecr-url" --query "Parameter.Value" --output text --region $REGION)

              # 4. INLOGGEN IN HET MAGAZIJN (ECR)
              ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
              aws ecr get-login-password --region $REGION | docker login --username AWS --password-stdin $ACCOUNT_ID.dkr.ecr.$REGION.amazonaws.com

              # 5. MELDEN BIJ DE BAAS (Swarm Worker - REQ-14)
              # Retry loop: de eerste poging kan mislukken als de manager net gestart is.
              for i in $(seq 1 10); do
                docker swarm join --token $TOKEN $MANAGER_IP:2377 && break
                echo "Swarm join poging $i mislukt, opnieuw proberen in 15s..."
                sleep 15
              done

              # 6. ECR LOGIN VERNIEUWEN (elke 6 uur, token verloopt na 12 uur)
              cat << 'CRON_ECR' > /etc/cron.d/ecr_login_refresh
              0 */6 * * * root REGION=$(curl -sq http://169.254.169.254/latest/dynamic/instance-identity/document | jq -r .region) && aws ecr get-login-password --region $REGION | docker login --username AWS --password-stdin $(aws sts get-caller-identity --query Account --output text).dkr.ecr.$REGION.amazonaws.com >> /var/log/ecr_refresh.log 2>&1
              CRON_ECR
              chmod 644 /etc/cron.d/ecr_login_refresh

              # 7. AUTOMATISCH HERJOINEN ALS DE SWARM MANAGER VERVANGEN WORDT
              # Controleert elke minuut of deze node nog actief in de Swarm zit.
              # Als de Buildserver vervangen is, haalt hij de nieuwe token op uit SSM en herjoined.
              cat << 'CRON_SWARM' > /etc/cron.d/swarm_rejoin
              * * * * * root REGION=$(curl -sq http://169.254.169.254/latest/dynamic/instance-identity/document | jq -r .region) && docker info --format '{{.Swarm.LocalNodeState}}' 2>/dev/null | grep -q "active" || (docker swarm leave --force 2>/dev/null; TOKEN=$(aws ssm get-parameter --name "/swarm/worker-token" --query "Parameter.Value" --output text --region $REGION); MANAGER_IP=$(aws ssm get-parameter --name "/swarm/manager-ip" --query "Parameter.Value" --output text --region $REGION); docker swarm join --token $TOKEN $MANAGER_IP:2377) >> /var/log/swarm_rejoin.log 2>&1
              CRON_SWARM
              chmod 644 /etc/cron.d/swarm_rejoin

            - EfsId:
                Fn::ImportValue: !Sub "${StorageStackName}:FileSystemId"

        TagSpecifications:
          - ResourceType: instance
            Tags:
              - Key: Name
                Value: CloudShirt-SwarmWorker

Outputs:
  LaunchTemplateIdRef:
    Description: Reference to the Launch Template ID
    Value: !Ref WebAppLaunchTemplate
    Export:
      Name: !Join [":", [!Ref "AWS::StackName", "LaunchTemplateId"]]

  LaunchTemplateVersionRef:
    Description: Reference to the Launch Template Latest Version
    Value: !GetAtt WebAppLaunchTemplate.LatestVersionNumber
    Export:
      Name: !Join [":", [!Ref "AWS::StackName", "LaunchTemplateVersion"]]

  TargetGroupArnRef:
    Description: Reference to the Target Group ARN
    Value: !Ref TargetGroup
    Export:
      Name: !Join [":", [!Ref "AWS::StackName", "TargetGroupArn"]]

  LoadBalancerDnsName:
    Description: De URL waar bezoekers de webshop kunnen bereiken!
    Value: !GetAtt ApplicationLoadBalancer.DNSName
    Export:
      Name: !Join [":", [!Ref "AWS::StackName", "ALBDnsName"]]