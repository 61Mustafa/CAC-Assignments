# Template Description:
# This template deploys an Application Load Balancer (ALB) to distribute traffic between two web server instances.
# It IMPORTS VPC/subnets from the base template and instance IDs from the instances template.
Description: Deploy an Application Load Balancer for the web application.

Parameters:
  # BaseStackName:
  # What: The name of the CloudFormation stack that contains the base VPC and networking resources.
  # Why: We need to import the VPC and subnet IDs from that stack for the ALB and target group.
  BaseStackName:
    Description: Name of the base stack to import values from
    Type: String
    Default: MyBase

  # InstancesStackName:
  # What: The name of the CloudFormation stack that contains the EC2 instances.
  # Why: We need to import the instance IDs to register them in the ALB's target group.
  InstancesStackName:
    Description: Name of the instances stack to import values from
    Type: String
    Default: MyInstances

Resources:
  # ALBSecurityGroup:
  # What: Security group that controls network traffic to the Application Load Balancer.
  # Why: Allows HTTP traffic (port 80) from the internet to reach the load balancer.
  #      The ALB then forwards this traffic to the instances in the target group.
  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP access to ALB
      VpcId:
        Fn::ImportValue: !Sub "${BaseStackName}:VPC" # Imports VPC ID from the base stack
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0 # Allow HTTP from anywhere (needed for public web access)
      Tags:
        - Key: Name
          Value: ALBSecurityGroup

  # WebAppALB:
  # What: Application Load Balancer that distributes incoming HTTP traffic across multiple EC2 instances.
  # Why: Provides high availability, fault tolerance, and better performance by spreading traffic across instances.
  #      If one instance fails, the ALB automatically routes traffic to healthy instances only.
  #      Requires subnets in at least 2 availability zones for redundancy.
  WebAppALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: WebAppALB
      Scheme: internet-facing # Makes the ALB accessible from the internet
      Type: application # Layer 7 load balancer (HTTP/HTTPS)
      IpAddressType: ipv4
      Subnets:
        - Fn::ImportValue: !Sub "${BaseStackName}:MyFirstSubnet" # ALB needs subnets in multiple AZs
        - Fn::ImportValue: !Sub "${BaseStackName}:MySecondSubnet"
      SecurityGroups:
        - !Ref ALBSecurityGroup
      Tags:
        - Key: Name
          Value: WebAppALB

  # WebAppTargetGroup:
  # What: Target group that contains the EC2 instances that will receive traffic from the load balancer.
  # Why: The ALB uses this to know which instances to send traffic to and monitors their health.
  #      Health checks ensure traffic only goes to healthy instances.
  WebAppTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: WebAppTargetGroup
      Port: 80 # The port on which targets (instances) receive traffic
      Protocol: HTTP
      VpcId:
        Fn::ImportValue: !Sub "${BaseStackName}:VPC"
      TargetType: instance # We're targeting EC2 instances (not IPs or Lambda functions)
      
      # Health Check Configuration:
      # What: Regular checks to determine if instances are healthy and can receive traffic.
      # Why: Unhealthy instances are automatically removed from rotation until they recover.
      HealthCheckEnabled: true
      HealthCheckProtocol: HTTP
      HealthCheckPath: / # Path to check (root of the web app)
      HealthCheckIntervalSeconds: 30 # Check every 30 seconds
      HealthCheckTimeoutSeconds: 5 # Wait 5 seconds for response
      HealthyThresholdCount: 2 # 2 successful checks = healthy
      UnhealthyThresholdCount: 2 # 2 failed checks = unhealthy
      
      # Targets:
      # What: The list of EC2 instances that are part of this target group.
      # Why: These are imported from the instances stack so the ALB knows where to send traffic.
      Targets:
        - Id:
            Fn::ImportValue: !Sub "${InstancesStackName}:WebInstance1"
        - Id:
            Fn::ImportValue: !Sub "${InstancesStackName}:WebInstance2"
      Tags:
        - Key: Name
          Value: WebAppTargetGroup

  # ALBListener:
  # What: Listener that checks for incoming connection requests to the load balancer on port 80.
  # Why: Defines what happens when traffic arrives at the ALB - forwards it to the target group.
  #      Without a listener, the ALB would receive traffic but wouldn't know what to do with it.
  ALBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref WebAppALB
      Port: 80 # Listen for HTTP traffic on port 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward # Forward traffic to the target group
          TargetGroupArn: !Ref WebAppTargetGroup

Outputs:
  # ALBDNSName:
  # What: Outputs and exports the DNS name of the Application Load Balancer.
  # Why: This is the URL you use to access your web application (e.g., http://WebAppALB-123456789.us-east-1.elb.amazonaws.com).
  #      The ALB automatically distributes requests between your instances.
  ALBDNSName:
    Description: DNS name of the Application Load Balancer
    Value: !GetAtt WebAppALB.DNSName
    Export:
      Name: !Sub "${AWS::StackName}:ALBDNSName"

  # ALBArn:
  # What: Outputs and exports the ARN (Amazon Resource Name) of the load balancer.
  # Why: May be useful for future templates, monitoring, or IAM policies that need to reference this specific ALB.
  ALBArn:
    Description: ARN of the Application Load Balancer
    Value: !Ref WebAppALB
    Export:
      Name: !Sub "${AWS::StackName}:ALBArn"

  # TargetGroupArn:
  # What: Outputs and exports the ARN of the target group.
  # Why: May be useful for adding more instances to the target group later or for monitoring purposes.
  TargetGroupArn:
    Description: ARN of the Target Group
    Value: !Ref WebAppTargetGroup
    Export:
      Name: !Sub "${AWS::StackName}:TargetGroupArn"