Description: Dit CloudFormation bestand maakt de Auto Scaling Group en de Scheduled Actions (tijdschema's) aan voor REQ-02.

Parameters:
  BaseStackName:
    Description: Name of the foundational network stack
    Type: String
    Default: MyFundamentStack # Zorg dat deze naam klopt bij het deployen

  AppStackName:
    Description: Name of the application stack (Load Balancer & Launch Template)
    Type: String
    Default: MyAppStack # Verzin een goede naam voor je 3e stack bij het deployen en vul die hier in!

Resources:
  #======================================
  # Auto Scaling Group
  #======================================

  WebAppAutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      AutoScalingGroupName: ASG
      VPCZoneIdentifier:
        - Fn::ImportValue: !Sub "${BaseStackName}:AZ1PrivateSubnet"
        - Fn::ImportValue: !Sub "${BaseStackName}:AZ2PrivateSubnet"
      LaunchTemplate:
        LaunchTemplateId:
          Fn::ImportValue: !Sub "${AppStackName}:LaunchTemplateId"
        Version:
          Fn::ImportValue: !Sub "${AppStackName}:LaunchTemplateVersion"
      MinSize: '2'
      MaxSize: '5'
      DesiredCapacity: '2'
      TargetGroupARNs:
        - Fn::ImportValue: !Sub "${AppStackName}:TargetGroupArn"
      Tags:
        - Key: Name
          Value: CLOUDSHIRT-ASG-INSTANCE
          PropagateAtLaunch: true# Zorgt ervoor dat elke EC2 instance deze tag krijgt
  #======================================
  # Scheduled Actions
  #======================================

  # ScaleUpAction:
  # What: Een geplande actie die de gewenste capaciteit (DesiredCapacity) verhoogt naar 3 servers.
  # Why: Tussen 18:00 en 20:00 (NL tijd) verwachten we drukte. 18:00 NL tijd (zomertijd) is 16:00 in UTC tijd.
  ScaleUpAction:
    Type: AWS::AutoScaling::ScheduledAction
    Properties:
      AutoScalingGroupName: !Ref WebAppAutoScalingGroup
      ScheduledActionName: ScaleUpForEveningTraffic
      Recurrence: "0 16 * * *" # Elke dag om 16:00 UTC (18:00 Nederlandse tijd)
      MinSize: 3 # Tijdens de piek is het minimum 3
      DesiredCapacity: 3 # We forceren hem naar 3 servers
      MaxSize: 5 # Maximum blijft 5

  # ScaleDownAction:
  # What: Een geplande actie die de gewenste capaciteit (DesiredCapacity) weer terugzet naar 2 servers.
  # Why: Om 20:00 (NL tijd) is de drukte voorbij en schalen we af om kosten te besparen. 20:00 NL tijd is 18:00 UTC tijd.
  ScaleDownAction:
    Type: AWS::AutoScaling::ScheduledAction
    Properties:
      AutoScalingGroupName: !Ref WebAppAutoScalingGroup
      ScheduledActionName: ScaleDownAfterEveningTraffic
      Recurrence: "0 18 * * *" # Elke dag om 18:00 UTC (20:00 Nederlandse tijd)
      MinSize: 2 # Na de piek is het minimum weer 2
      DesiredCapacity: 2 # We forceren hem terug naar 2 servers
      MaxSize: 5 # Maximum blijft 5