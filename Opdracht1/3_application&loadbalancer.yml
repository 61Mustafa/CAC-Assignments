Description: Dit CloudFormation bestand maakt de Load Balancer en het EC2 Launch Template voor de CloudShirt .NET webapplicatie.

Parameters:
  BaseStackName:
    Description: Name of the foundational network stack
    Type: String
    Default: MyFundamentStack

  StorageStackName:
    Description: Name of the storage stack (where EFS is created)
    Type: String
    Default: MyStorageStack # Zorg dat je de Data & Storage stack straks zo noemt

  KeyName:
    Description: Name of an existing EC2 KeyPair for SSH access
    Type: AWS::EC2::KeyPair::KeyName
    Default: vockey

  LatestAmiId:
    Description: Latest Amazon Linux 2 AMI
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2

Resources:
  #======================================
  # Load Balancing
  #======================================

  # ApplicationLoadBalancer:
  # What: De virtuele verkeersregelaar (ALB) die op het internet is aangesloten.
  # Why: Zorgt voor High Availability (REQ-01) door binnenkomende bezoekers eerlijk te verdelen over de webservers in de twee onderliggende Availability Zones.
  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: ALB
      Scheme: internet-facing
      Type: application
      IpAddressType: ipv4
      Subnets:
        - Fn::ImportValue: !Sub "${BaseStackName}:AZ1PublicSubnet" # ALB móét in publieke subnets staan
        - Fn::ImportValue: !Sub "${BaseStackName}:AZ2PublicSubnet"
      SecurityGroups:
        - Fn::ImportValue: !Sub "${BaseStackName}:ALBSecurityGroup"
      Tags:
        - Key: Name
          Value: APPLICATION-LOADBALANCER

  # TargetGroup:
  # What: Een logische groep (de 'bak') waar de Auto Scaling Group straks de EC2 instances in plaatst.
  # Why: De Load Balancer stuurt verkeer naar deze Target Group. De Health Checks controleren elke 30 seconden of de .NET app op de server nog reageert (poort 80). Zo niet, krijgt die server geen verkeer meer.
  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: CloudShirt-TG
      Port: 80
      Protocol: HTTP
      VpcId:
        Fn::ImportValue: !Sub "${BaseStackName}:VPC"
      TargetType: instance
      HealthCheckEnabled: true
      HealthCheckProtocol: HTTP
      HealthCheckPath: /
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 2
      Tags:
        - Key: Name
          Value: TARGET-GROUP

  # ALBListener:
  # What: De "oren" van de Load Balancer.
  # Why: Luistert naar inkomend HTTP-verkeer (poort 80) vanaf het internet en stuurt het linea recta door (forward) naar de webservers in de Target Group.
  ALBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

  #======================================
  # Launch Template
  #======================================

  # WebAppLaunchTemplate:
  # What: De blauwdruk (sjabloon) voor elke nieuwe webserver die Auto Scaling gaat aanmaken.
  # Why: Bevat alle instructies over het besturingssysteem, de firewall en vooral: het opstartscript (UserData) dat de server volledig automatisch installeert zonder menselijke tussenkomst.
  WebAppLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: CloudShirt-LaunchTemplate
      LaunchTemplateData:
        ImageId: !Ref LatestAmiId
        InstanceType: t2.micro # Gratis tier vriendelijk
        KeyName: !Ref KeyName
        SecurityGroupIds:
          - Fn::ImportValue: !Sub "${BaseStackName}:WebServerSecurityGroup"

        # UserData is het bash script dat éénmalig draait als de server voor het eerst opstart (als root).
        UserData:
          Fn::Base64: !Sub
            - |
              #!/bin/bash
              # 1. Updates en tools (inclusief .NET 6 SDK)
              yum update -y
              rpm -Uvh https://packages.microsoft.com/config/centos/7/packages-microsoft-prod.rpm
              yum install -y git jq amazon-efs-utils dotnet-sdk-6.0

              # 2. EFS Aankoppelen (Logs)
              mkdir -p /var/log/cloudshirt
              mount -t efs -o tls ${EfsId}:/ /var/log/cloudshirt
              echo "${EfsId}:/ /var/log/cloudshirt efs defaults,_netdev 0 0" >> /etc/fstab

              # 3. CloudShirt ophalen van de juiste repo
              cd /home/ec2-user
              git clone https://github.com/looking4ward/CloudShirt.git
              
              # 4. Database connectie instellen met de SED commando's van de docent
              # We vervangen ${!RDSENDPOINT} door de werkelijke url uit stack 2. Let op dat we ook de DBUser en DBPassword variabelen invullen!
              sed -i "s/Server.*CatalogDb;/Server=${DatabaseEndpoint},1433;User ID=${DBUser};Password=${DBPassword};Initial Catalog=Microsoft.eShopOnWeb.CatalogDb;/" /home/ec2-user/CloudShirt/src/Web/appsettings.json
              sed -i "s/Server.*Identity;/Server=${DatabaseEndpoint},1433;User ID=${DBUser};Password=${DBPassword};Initial Catalog=Microsoft.eShopOnWeb.Identity;/" /home/ec2-user/CloudShirt/src/Web/appsettings.json

              # 5. Publiceren (volgens hint docent)
              export HOME=/home/ec2-user
              export DOTNET_CLI_HOME=/home/ec2-user
              cd /home/ec2-user/CloudShirt/src/Web
              dotnet publish -c Release -o /home/ec2-user/release
              
              # 6. Opstarten vanuit de release folder en logs naar EFS sturen
              cd /home/ec2-user/release
              nohup dotnet Web.dll --urls http://0.0.0.0:80 > /var/log/cloudshirt/webapp.log 2>&1 &
            - EfsId:
                Fn::ImportValue: !Sub "${StorageStackName}:FileSystemId"
              DatabaseEndpoint:
                Fn::ImportValue: !Sub "${StorageStackName}:DatabaseEndpoint"
              DBUser: postgresadmin # Vul hier dezelfde user in als in stack 2
              DBPassword: Komjenietin123! # Vul hier hetzelfde wachtwoord in als in stack 2

        TagSpecifications:
          - ResourceType: instance
            Tags:
              - Key: Name
                Value: CloudShirt-WebServer

Outputs:
  LaunchTemplateIdRef:
    Description: Reference to the Launch Template ID
    Value: !Ref WebAppLaunchTemplate
    Export:
      Name: !Join [":", [!Ref "AWS::StackName", "LaunchTemplateId"]]

  LaunchTemplateVersionRef:
    Description: Reference to the Launch Template Latest Version
    Value: !GetAtt WebAppLaunchTemplate.LatestVersionNumber
    Export:
      Name: !Join [":", [!Ref "AWS::StackName", "LaunchTemplateVersion"]]

  TargetGroupArnRef:
    Description: Reference to the Target Group ARN
    Value: !Ref TargetGroup
    Export:
      Name: !Join [":", [!Ref "AWS::StackName", "TargetGroupArn"]]

  LoadBalancerDnsName:
    Description: De URL waar bezoekers de webshop kunnen bereiken!
    Value: !GetAtt ApplicationLoadBalancer.DNSName
    Export:
      Name: !Join [":", [!Ref "AWS::StackName", "ALBDnsName"]]